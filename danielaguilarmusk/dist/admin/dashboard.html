<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de control | Daniel Aguilar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
  <script type="module" crossorigin src="/antigravity/danielaguilarmusk/dist/assets/dashboard-BdcuI7Ib.js"></script>
  <link rel="modulepreload" crossorigin href="/antigravity/danielaguilarmusk/dist/assets/index-BYiGy0QT.js">
  <link rel="modulepreload" crossorigin href="/antigravity/danielaguilarmusk/dist/assets/firebase-wPzszKGM.js">
  <link rel="modulepreload" crossorigin href="/antigravity/danielaguilarmusk/dist/assets/lucide-Ddjmf5Sb.js">
  <link rel="stylesheet" crossorigin href="/antigravity/danielaguilarmusk/dist/assets/index-CkdH9YpU.css">
</head>

<body class="relative bg-brand-bg text-brand-text min-h-screen overflow-x-hidden w-full font-sans antialiased">
    <main id="app-content">
        <div class="min-h-screen bg-brand-bg text-brand-text p-6 md:p-12 font-sans w-full">
            <div class="max-w-4xl mx-auto">
                <!-- Header -->
                <div
                    class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-[#0f172a] p-6 rounded-3xl border border-white/10 shadow-2xl mb-8">
                    <div>
                        <h1 class="font-headings text-2xl md:text-3xl text-brand-text">Panel del Artista</h1>
                        <p class="font-mono text-xs text-brand-accent uppercase mt-2">Agenda // En vivo</p>
                    </div>
                    <button id="logout-btn"
                        class="flex items-center gap-2 px-4 py-2 border border-white/10 hover:border-red-500/50 hover:bg-red-500/10 text-white hover:text-red-400 rounded-full transition-all text-xs font-mono uppercase tracking-widest">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                    </button>
                </div>

                <!-- Form -->
                <div class="bg-[#0f172a] p-6 rounded-3xl border border-white/10 shadow-2xl mb-8">
                    <h2 id="form-title" class="font-headings text-xl mb-6">Añadir nueva fecha</h2>
                    <form id="show-form" class="flex flex-col gap-4">
                        <input type="hidden" id="editing-id" value="">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                            <div class="relative">
                                <input type="date" id="show-date" required
                                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-accent transition-colors text-white/80" />
                            </div>
                            <div class="relative">
                                <i data-lucide="clock"
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30 w-4 h-4"></i>
                                <input type="time" id="show-time"
                                    class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-brand-accent transition-colors text-white/80" />
                            </div>
                            <div class="relative">
                                <i data-lucide="map"
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30 w-4 h-4"></i>
                                <input type="text" id="show-city" list="cities-list" placeholder="Ciudad (ej. Madrid)"
                                    required
                                    class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-brand-accent transition-colors" />
                            </div>
                            <div class="relative">
                                <i data-lucide="map-pin"
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30 w-4 h-4"></i>
                                <input type="text" id="show-venue" list="venues-list" placeholder="Sala / Recinto"
                                    required
                                    class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-brand-accent transition-colors" />
                            </div>
                            <div class="flex gap-2">
                                <button type="submit" id="submit-btn"
                                    class="flex-1 bg-brand-accent text-brand-bg rounded-xl font-bold uppercase tracking-widest text-xs py-3 flex items-center justify-center gap-2 hover:bg-white transition-colors">
                                    <i data-lucide="plus" id="submit-icon" class="w-4 h-4"></i> <span
                                        id="submit-text">Añadir</span>
                                </button>
                                <button type="button" id="cancel-btn"
                                    class="hidden px-4 bg-white/10 text-white hover:bg-white/20 rounded-xl font-bold transition-colors"
                                    title="Cancelar">✕</button>
                            </div>
                        </div>
                        <datalist id="cities-list"></datalist>
                        <datalist id="venues-list"></datalist>
                    </form>
                </div>

                <!-- List -->
                <div class="bg-[#0f172a] p-6 rounded-3xl border border-white/10 shadow-2xl">
                    <h2 class="font-headings text-xl mb-6 flex justify-between items-center">
                        Tus conciertos publicados
                        <span id="shows-count" class="text-xs font-mono bg-white/10 px-3 py-1 rounded-full">0
                            shows</span>
                    </h2>

                    <div id="empty-state"
                        class="text-center py-12 text-white/30 font-mono text-sm border border-dashed border-white/10 rounded-xl">
                        No hay fechas programadas actualmente.
                    </div>

                    <div id="shows-list" class="flex flex-col gap-3">
                        <!-- Items will be injected here via JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
