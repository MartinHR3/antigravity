<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Daniel Aguilar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/index.css" />
</head>

<body class="relative bg-brand-bg text-brand-text min-h-screen overflow-x-hidden w-full font-sans antialiased">
    <main id="app-content">
        <div class="min-h-screen bg-brand-bg flex items-center justify-center px-4 font-mono w-full">
            <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-3xl border border-white/10 shadow-2xl">
                <h1 class="font-headings text-3xl text-brand-text mb-2 text-center">Acceso Privado</h1>
                <p class="text-white/40 mb-8 text-center text-sm">Dashboard de la Gira</p>

                <div id="error-message"
                    class="hidden bg-red-500/10 border border-red-500/50 text-red-500 p-3 rounded-xl mb-6 text-sm text-center">
                </div>

                <form id="login-form" class="flex flex-col gap-5">
                    <div>
                        <label class="block text-brand-text text-sm mb-2 opacity-60">Email</label>
                        <input type="email" id="email" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accent transition-colors" />
                    </div>
                    <div>
                        <label class="block text-brand-text text-sm mb-2 opacity-60">Contraseña</label>
                        <input type="password" id="password" required
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accent transition-colors" />
                    </div>

                    <button type="submit" id="submit-btn"
                        class="w-full bg-brand-accent text-brand-bg font-bold uppercase tracking-widest py-4 rounded-xl mt-4 hover:bg-white transition-colors disabled:opacity-50">
                        Entrar
                    </button>

                    <a href="/"
                        class="block text-white/30 text-xs text-center mt-4 hover:text-white transition-colors">Volver a
                        la web pública</a>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="/src/js/login.js"></script>
</body>

</html>
